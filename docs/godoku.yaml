title: Godoku
description: Static site generator for documentation & API references, built in Go
url: https://godoku.omurilo.dev
language: en
theme: default
branding:
  logo_dark: /static/logo-dark.svg
  logo_light: /static/logo-light.svg
  logo_alt: Godoku
  logo_link: /
navigation:
  - label: Docs
    path: /docs
  - label: Guides
    path: /guides
sections:
  docs: content/docs
  guides: content/guides

edit_base_url: https://github.com/omurilo/godoku/edit/main/docs

banner:
  message: "🚀 Godoku v1.1.1 released — now with TOC, banners, llms.txt and more!"
  color: info
  dismissible: true

llms:
  llms_txt: true
  llms_txt_full: true

footer:
  position: center
  copyright: "© 2026 Godoku. Built with ❤️ in Go."
  columns:
    - title: Documentation
      links:
        - label: Getting Started
          href: /docs/getting-started
        - label: Configuration
          href: /docs/configuration
        - label: Features
          href: /docs/features/sections
    - title: Guides
      links:
        - label: GitHub Pages
          href: /guides/github-pages
        - label: Self Hosting
          href: /guides/self-hosting
  social:
    - icon: github
      href: https://github.com/omurilo/godoku
    - icon: bluesky
      href: https://bsky.app/profile/omurilo.dev
