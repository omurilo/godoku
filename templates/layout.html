<!DOCTYPE html>
<html lang="{{.Config.Language}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageTitle}} - {{.Config.Title}}</title>
    <meta name="description" content="{{.PageDescription}}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{.CanonicalURL}}">

    <!-- Open Graph -->
    <meta property="og:type" content="{{.OGType}}">
    <meta property="og:title" content="{{.PageTitle}} - {{.Config.Title}}">
    <meta property="og:description" content="{{.PageDescription}}">
    <meta property="og:url" content="{{.CanonicalURL}}">
    <meta property="og:site_name" content="{{.Config.Title}}">
    <meta property="og:locale" content="{{.Config.Language}}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{.PageTitle}} - {{.Config.Title}}">
    <meta name="twitter:description" content="{{.PageDescription}}">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{.Config.Title}}",
        "description": "{{.Config.Description}}",
        "url": "{{.Config.URL}}"
    }
    </script>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">{{.Config.Title}}</a>
            <div class="nav-links">
                {{range .NavItems}}
                <a href="{{.Path}}" class="nav-link">{{.Label}}</a>
                {{end}}
            </div>
        </div>
    </nav>
    <main class="main">
        {{.Body}}
    </main>
    <footer class="footer">
        <div class="footer-inner">
            <p>Built with <a href="https://github.com/omurilo/godoku">Godoku</a></p>
        </div>
    </footer>
    <script src="/static/script.js"></script>
</body>
</html>
